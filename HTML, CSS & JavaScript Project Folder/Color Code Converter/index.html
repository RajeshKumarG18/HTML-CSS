            <h1>Color Code Converter</h1>

        <div class="color-preview">
            <div class="color-display" id="colorDisplay"></div>
            <div class="color-info">
                <span id="currentColorCode">#FFFFFF</span>
                <button id="copyColorBtn" title="Copy color code">
                    <i class="far fa-copy"></i>

        </div>
        
        <div class="converter-container">
            <div class="input-section">
                <div class="input-group">

                <div class="input-group">
                    <label for="rgb">RGB</label>
                    <div class="multi-input">
                        <input type="number" id="r" placeholder="R" min="0" max="255">

                    </div>
                </div>
                
                <div class="input-group">
                    <label for="hsl">HSL</label>

                        <input type="number" id="h" placeholder="H" min="0" max="360">
                        <input type="number" id="s" placeholder="S" min="0" max="100">
                        <input type="number" id="l" placeholder="L" min="0" max="100">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="cmyk">CMYK</label>
                    <div class="multi-input">
                        <input type="number" id="c" placeholder="C" min="0" max="100">
                        <input type="number" id="m" placeholder="M" min="0" max="100">
                        <input type="number" id="y" placeholder="Y" min="0" max="100">
                        <input type="number" id="k" placeholder="K" min="0" max="100">
